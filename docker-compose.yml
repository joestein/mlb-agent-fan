services:
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=mlb_fan
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      # Bind to loopback only so the DB is never exposed on the host's network.
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  web:
    build: .
    ports:
      - "4000:4000"
    environment:
      - DATABASE_URL=ecto://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/mlb_fan
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}
      - PHX_HOST=${PHX_HOST:-localhost}
      - PORT=4000
      - PHX_SERVER=true
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-opus-4-8}
      - EXA_API_KEY=${EXA_API_KEY}
      - EXA_SEARCH_PRICE_USD=${EXA_SEARCH_PRICE_USD:-0.005}
      - EXA_CONTENTS_PRICE_USD=${EXA_CONTENTS_PRICE_USD:-0.001}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
